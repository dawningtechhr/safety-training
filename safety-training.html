<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>職場不法侵害及霸凌預防 — 主管教育訓練</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1a1814;--ink2:#3d3a34;--ink3:#7a7570;
  --paper:#faf9f6;--paper2:#f2f0eb;--paper3:#e8e5de;
  --accent:#e8671a;--accent2:#c9540f;--accent-light:#fef3ec;
  --green:#1a7a3a;--green-light:#e8f5ed;
  --orange:#d45e10;--orange-light:#fef0e6;
  --danger:#e8671a;--danger-light:#fef3ec;
  --red:#8b2020;--red-light:#fde8e8;
  --purple:#5a3a9a;--purple-light:#f0ebfa;
  --navy:#1a3a6a;
  --radius:4px;--radius-lg:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;overflow-x:hidden}
.screen{display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column}

/* COVER */
#screen-cover{background:var(--paper);align-items:center;justify-content:center;text-align:center;padding:2rem}
#screen-cover .logo-wrap img{height:88px;margin-bottom:2rem}
#screen-cover .new-law-badge{background:var(--accent-light);color:var(--accent2);border:1px solid rgba(232,103,26,.3);border-radius:20px;padding:.35rem 1.2rem;font-size:.82rem;font-weight:700;letter-spacing:.08em;display:inline-block;margin-bottom:1.25rem}
#screen-cover h1{font-size:2rem;font-weight:700;color:var(--ink);line-height:1.35;margin-bottom:.6rem}
#screen-cover h2{font-size:.95rem;font-weight:400;color:var(--ink2);margin-bottom:2.25rem;line-height:1.6}
#screen-cover .meta{display:flex;gap:1.5rem;justify-content:center;flex-wrap:wrap;margin-bottom:2.75rem}
#screen-cover .meta span{background:var(--paper2);color:var(--ink2);border-radius:20px;padding:.35rem 1rem;font-size:.82rem;border:1px solid var(--paper3)}
#screen-cover .btn-start{background:var(--accent);color:#fff;font-size:.95rem;font-weight:700;padding:.9rem 2.75rem;border-radius:30px;border:none;cursor:pointer;font-family:inherit;transition:transform .15s,box-shadow .15s}
#screen-cover .btn-start:hover{background:var(--accent2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(232,103,26,.35)}

/* SLIDES */
#screen-slide{flex-direction:row}
.slide-sidebar{width:256px;min-width:256px;background:#fff;border-right:1px solid var(--paper3);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;overflow-y:auto}
.sidebar-logo{padding:1.2rem 1.4rem;border-bottom:1px solid var(--paper3)}
.sidebar-logo img{height:34px}
.sidebar-nav{padding:.6rem 0;flex:1}
.nav-chapter{padding:.4rem 1.4rem;font-size:.72rem;font-weight:700;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-top:.6rem}
.nav-item{display:flex;align-items:center;gap:.55rem;padding:.5rem 1.4rem;font-size:.82rem;color:var(--ink2);cursor:pointer;transition:background .1s;border-left:3px solid transparent}
.nav-item:hover{background:var(--paper)}
.nav-item.active{background:var(--danger-light);color:var(--danger);border-left-color:var(--danger);font-weight:500}
.nav-item .num{width:20px;height:20px;border-radius:50%;background:var(--paper2);font-size:.7rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nav-item.active .num{background:var(--danger);color:#fff}
.sidebar-footer{padding:.9rem 1.4rem;border-top:1px solid var(--paper3)}
.progress-bar{height:4px;background:var(--paper3);border-radius:2px;overflow:hidden;margin-bottom:.4rem}
.progress-fill{height:100%;background:var(--danger);border-radius:2px;transition:width .3s}
.progress-text{font-size:.72rem;color:var(--ink3)}
.slide-main{flex:1;overflow-y:auto;background:var(--paper);display:flex;flex-direction:column}
.slide-header{background:#fff;border-bottom:1px solid var(--paper3);padding:1.1rem 2.25rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.chapter-badge{font-size:.72rem;font-weight:700;color:var(--danger);background:var(--danger-light);padding:.22rem .7rem;border-radius:12px;letter-spacing:.04em}
.slide-num-text{font-size:.82rem;color:var(--ink3)}
.slide-content{flex:1;padding:2.25rem 2.5rem;max-width:840px;width:100%;margin:0 auto}
.slide-title{font-size:1.7rem;font-weight:700;color:var(--ink);margin-bottom:.4rem;line-height:1.3}
.slide-subtitle{font-size:.92rem;color:var(--ink3);margin-bottom:1.75rem;padding-bottom:1.25rem;border-bottom:2px solid var(--paper3);line-height:1.6}
.slide-nav{background:#fff;border-top:1px solid var(--paper3);padding:.9rem 2.25rem;display:flex;justify-content:space-between;align-items:center}

/* CARDS & BOXES */
.card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:.9rem;margin:1.25rem 0}
.card{background:#fff;border-radius:var(--radius-lg);border:1px solid var(--paper3);padding:1.1rem}
.card-icon{font-size:1.75rem;margin-bottom:.6rem}
.card-title{font-size:.9rem;font-weight:700;color:var(--ink);margin-bottom:.35rem}
.card-body{font-size:.82rem;color:var(--ink2);line-height:1.7}
.card.red{border-left:4px solid var(--danger);border-radius:0 var(--radius-lg) var(--radius-lg) 0}
.card.blue{border-left:4px solid var(--accent);border-radius:0 var(--radius-lg) var(--radius-lg) 0}
.card.green{border-left:4px solid var(--green);border-radius:0 var(--radius-lg) var(--radius-lg) 0}
.card.orange{border-left:4px solid var(--orange);border-radius:0 var(--radius-lg) var(--radius-lg) 0}
.card.purple{border-left:4px solid var(--purple);border-radius:0 var(--radius-lg) var(--radius-lg) 0}
.info-box{border-radius:var(--radius-lg);padding:1.1rem 1.35rem;margin:1.1rem 0}
.info-box.red{background:var(--danger-light);border-left:4px solid var(--danger)}
.info-box.blue{background:var(--accent-light);border-left:4px solid var(--accent)}
.info-box.green{background:var(--green-light);border-left:4px solid var(--green)}
.info-box.orange{background:var(--orange-light);border-left:4px solid var(--orange)}
.info-box.purple{background:var(--purple-light);border-left:4px solid var(--purple)}
.info-box .box-title{font-weight:700;font-size:.88rem;margin-bottom:.5rem;color:var(--ink)}
.info-box ul{padding-left:1.15rem}
.info-box li{font-size:.85rem;color:var(--ink2);line-height:1.85;margin-bottom:.1rem}
.info-box p{font-size:.85rem;color:var(--ink2);line-height:1.8}
.law-article{background:#fff;border:1px solid var(--paper3);border-radius:var(--radius-lg);padding:1.1rem;margin:.9rem 0}
.law-article .art-num{font-size:.72rem;font-weight:700;color:var(--danger);background:var(--danger-light);padding:.18rem .6rem;border-radius:10px;display:inline-block;margin-bottom:.5rem}
.law-article p{font-size:.85rem;color:var(--ink2);line-height:1.85}
.table-wrap{overflow-x:auto;margin:1.1rem 0}
table{width:100%;border-collapse:collapse;font-size:.83rem}
th{background:var(--danger);color:#fff;padding:.55rem .9rem;text-align:left;font-weight:500}
td{padding:.55rem .9rem;border-bottom:1px solid var(--paper3);color:var(--ink2);line-height:1.6}
tr:nth-child(even) td{background:var(--paper)}
.scenario-box{background:#fff;border:1px solid var(--paper3);border-radius:var(--radius-lg);padding:1.25rem;margin:1rem 0}
.scenario-box .sc-label{font-size:.72rem;font-weight:700;background:var(--orange-light);color:var(--orange);padding:.18rem .6rem;border-radius:10px;display:inline-block;margin-bottom:.6rem}
.scenario-box .sc-case{font-size:.875rem;color:var(--ink);line-height:1.75;font-weight:500;margin-bottom:.6rem}
.scenario-box .sc-answer{font-size:.83rem;color:var(--ink2);line-height:1.75;border-top:1px solid var(--paper3);padding-top:.6rem;margin-top:.6rem}

/* BUTTONS */
.btn{font-family:inherit;cursor:pointer;border-radius:var(--radius);font-size:.88rem;font-weight:500;padding:.55rem 1.4rem;transition:all .15s;border:none}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:transparent;color:var(--ink2);border:1px solid var(--paper3)}
.btn-secondary:hover{background:var(--paper)}
.btn-success{background:var(--green);color:#fff}
.btn-success:hover{background:#14602e}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* REGISTER */
#screen-register{align-items:center;justify-content:center;background:var(--paper)}
.register-card{background:#fff;border-radius:12px;border:1px solid var(--paper3);padding:2.25rem;width:100%;max-width:460px;box-shadow:0 4px 20px rgba(0,0,0,.06)}
.register-card h2{font-size:1.3rem;font-weight:700;color:var(--ink);margin-bottom:.35rem}
.register-card p{font-size:.85rem;color:var(--ink3);margin-bottom:1.75rem}
.form-group{margin-bottom:1.1rem}
.form-group label{display:block;font-size:.8rem;font-weight:700;color:var(--ink2);margin-bottom:.35rem}
.form-group input,.form-group select{width:100%;padding:.62rem .9rem;border:1px solid var(--paper3);border-radius:var(--radius);font-family:inherit;font-size:.88rem;color:var(--ink);background:var(--paper);outline:none;transition:border-color .15s}
.form-group input:focus,.form-group select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,103,26,.15)}
.quiz-rules{background:var(--danger-light);border-radius:var(--radius-lg);padding:.9rem 1.1rem;margin:1.25rem 0;font-size:.8rem;color:var(--ink2);line-height:1.85}
.quiz-rules strong{color:var(--danger)}

/* QUIZ */
#screen-quiz{background:var(--paper)}
.quiz-header{background:#fff;border-bottom:1px solid var(--paper3);padding:.9rem 1.75rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:10}
.quiz-progress-wrap{display:flex;align-items:center;gap:.9rem;flex:1}
.quiz-progress-bar{flex:1;height:5px;background:var(--paper3);border-radius:3px;overflow:hidden}
.quiz-progress-fill{height:100%;background:var(--danger);border-radius:3px;transition:width .3s}
.quiz-timer{font-size:.82rem;font-weight:700;color:var(--danger);background:var(--danger-light);padding:.28rem .75rem;border-radius:12px;white-space:nowrap}
.quiz-body{max-width:740px;margin:0 auto;padding:1.75rem}
.q-count{font-size:.78rem;font-weight:700;color:var(--danger);background:var(--danger-light);padding:.22rem .7rem;border-radius:12px;display:inline-block;margin-bottom:.75rem}
.q-category{font-size:.75rem;color:var(--ink3);margin-bottom:.6rem}
.q-text{font-size:1.05rem;font-weight:500;color:var(--ink);line-height:1.65;margin-bottom:1.35rem}
.options{display:flex;flex-direction:column;gap:.65rem}
.option{display:flex;align-items:flex-start;gap:.7rem;padding:.9rem 1.1rem;background:#fff;border:1.5px solid var(--paper3);border-radius:var(--radius-lg);cursor:pointer;transition:all .15s;font-size:.88rem;color:var(--ink2);line-height:1.5}
.option:hover{border-color:var(--accent);background:var(--accent-light)}
.option.selected{border-color:var(--accent);background:var(--accent-light);color:var(--accent);font-weight:500}
.option.correct{border-color:var(--green);background:var(--green-light);color:var(--green);font-weight:500}
.option.wrong{border-color:var(--red);background:var(--red-light);color:var(--red)}
.option.disabled{pointer-events:none}
.option-label{width:22px;height:22px;border-radius:50%;background:var(--paper2);font-size:.75rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.option.selected .option-label{background:var(--accent);color:#fff}
.option.correct .option-label{background:var(--green);color:#fff}
.option.wrong .option-label{background:var(--red);color:#fff}
.explain-box{background:var(--green-light);border-left:4px solid var(--green);border-radius:0 var(--radius-lg) var(--radius-lg) 0;padding:.9rem 1.1rem;margin-top:.9rem;font-size:.85rem;color:var(--ink2);line-height:1.75;display:none}
.quiz-actions{display:flex;justify-content:space-between;align-items:center;margin-top:1.75rem}

/* RESULT */
#screen-result{background:var(--paper);padding:2rem;min-height:100vh}
.result-wrap{max-width:740px;width:100%;margin:0 auto}
.result-hero{border-radius:12px;padding:2.25rem;color:#fff;text-align:center;margin-bottom:1.75rem}
.result-hero.pass{background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%)}
.result-hero.fail{background:linear-gradient(135deg,var(--red) 0%,#5a1010 100%)}
.result-score{font-size:3.75rem;font-weight:700;line-height:1}
.result-verdict{font-size:1.2rem;font-weight:500;margin-top:.4rem}
.result-meta{display:flex;justify-content:center;gap:2rem;margin-top:1.25rem;flex-wrap:wrap}
.result-meta span{font-size:.83rem;opacity:.85}
.result-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.9rem;margin-bottom:1.75rem}
.rs-box{background:#fff;border-radius:var(--radius-lg);border:1px solid var(--paper3);padding:1.1rem;text-align:center}
.rs-num{font-size:1.75rem;font-weight:700}
.rs-num.green{color:var(--green)}.rs-num.red{color:var(--red)}.rs-num.blue{color:var(--accent)}
.rs-label{font-size:.75rem;color:var(--ink3);margin-top:.2rem}
.wrong-section h3{font-size:.95rem;font-weight:700;color:var(--ink);margin-bottom:.9rem}
.wrong-item{background:#fff;border:1px solid var(--paper3);border-radius:var(--radius-lg);padding:1.1rem;margin-bottom:.65rem}
.wrong-item .wi-q{font-size:.875rem;font-weight:500;color:var(--ink);line-height:1.55;margin-bottom:.4rem}
.wrong-item .wi-wrong{font-size:.8rem;color:var(--red);margin:.4rem 0}
.wrong-item .wi-correct{font-size:.8rem;color:var(--green);font-weight:500}
.wrong-item .wi-explain{font-size:.8rem;color:var(--ink3);margin-top:.35rem;line-height:1.65}
.result-actions{display:flex;gap:.9rem;justify-content:center;margin-top:1.75rem;flex-wrap:wrap}
.saving-banner{border-radius:var(--radius-lg);padding:.9rem;text-align:center;font-size:.83rem;margin-bottom:1.25rem}
.saving-banner.pending{background:var(--accent-light);color:var(--accent)}
.saving-banner.ok{background:var(--green-light);color:var(--green)}
.saving-banner.err{background:var(--red-light);color:var(--red)}
</style>
</head>
<body>

<!-- COVER -->
<div id="screen-cover" class="screen active">
  <div class="logo-wrap"><img src="敦新LOGO.webp" alt="敦新" onerror="this.style.display='none'"></div>
  <h1>職場不法侵害及霸凌預防<br>主管教育訓練</h1>
  <h2>依職業安全衛生法第6條第2項修正規定<br>全體主管必修課程</h2>
  <div class="meta">
    <span>📋 10 單元課程</span>
    <span>⏱ 約 40 分鐘</span>
    <span>📝 20 題測驗</span>
  </div>
  <button class="btn-start" onclick="goSlides()">開始上課 →</button>
</div>

<!-- SLIDES -->
<div id="screen-slide" class="screen">
  <div class="slide-sidebar">
    <div class="sidebar-logo"><img src="敦新LOGO.webp" alt="敦新" onerror="this.style.display='none'"></div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="progress-bar"><div class="progress-fill" id="sidebar-progress"></div></div>
      <div class="progress-text" id="sidebar-progress-text">0 / 10 完成</div>
    </div>
  </div>
  <div class="slide-main">
    <div class="slide-header">
      <span class="chapter-badge" id="slide-chapter-badge"></span>
      <span class="slide-num-text" id="slide-num-text"></span>
    </div>
    <div class="slide-content" id="slide-content"></div>
    <div class="slide-nav">
      <button class="btn btn-secondary" id="btn-prev" onclick="prevSlide()">← 上一頁</button>
      <button class="btn btn-primary" id="btn-next" onclick="nextSlide()">下一頁 →</button>
    </div>
  </div>
</div>

<!-- REGISTER -->
<div id="screen-register" class="screen">
  <div class="register-card">
    <h2>📝 進入測驗</h2>
    <p>請填寫個人資料後開始測驗</p>
    <div class="form-group"><label>姓名 *</label><input type="text" id="reg-name" placeholder="請輸入姓名"></div>
    <div class="form-group">
      <label>部門 *</label>
      <input type="text" id="reg-dept" placeholder="請輸入部門名稱">
    </div>
    <div class="form-group"><label>工號 *</label><input type="text" id="reg-id" placeholder="請輸入工號"></div>
    <div class="quiz-rules">
      <strong>測驗說明：</strong><br>
      • 題庫共 100 題（法規題 50 題＋實務題 50 題）<br>
      • 系統將<strong>隨機抽取 20 題</strong>進行測驗<br>
      • 限時 30 分鐘，答完全部方可提交<br>
      • <strong>80 分（含）以上</strong>視為通過，測驗後立即顯示結果
    </div>
    <button class="btn btn-primary" style="width:100%;padding:.82rem" onclick="startQuiz()">開始測驗</button>
    <button class="btn btn-secondary" style="width:100%;padding:.68rem;margin-top:.55rem" onclick="goSlides()">← 返回課程複習</button>
  </div>
</div>

<!-- QUIZ -->
<div id="screen-quiz" class="screen">
  <div class="quiz-header">
    <div class="quiz-progress-wrap">
      <span style="font-size:.8rem;color:var(--ink3);white-space:nowrap" id="q-progress-label">1 / 20</span>
      <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="q-progress-fill"></div></div>
    </div>
    <div class="quiz-timer" id="quiz-timer">30:00</div>
  </div>
  <div class="quiz-body">
    <div class="q-count" id="q-count-badge"></div>
    <div class="q-category" id="q-category"></div>
    <div class="q-text" id="q-text"></div>
    <div class="options" id="q-options"></div>
    <div class="explain-box" id="q-explain"></div>
    <div class="quiz-actions">
      <button class="btn btn-secondary" id="q-btn-prev" onclick="quizPrev()">← 上一題</button>
      <button class="btn btn-primary" id="q-btn-next" onclick="quizNext()">下一題 →</button>
    </div>
  </div>
</div>

<!-- RESULT -->
<div id="screen-result" class="screen">
  <div class="result-wrap">
    <div class="saving-banner pending" id="saving-banner">⏳ 正在將測驗紀錄儲存至 Google 試算表...</div>
    <div class="result-hero" id="result-hero">
      <div class="result-score" id="result-score">0</div>
      <div class="result-verdict" id="result-verdict"></div>
      <div class="result-meta">
        <span id="result-time-spent"></span>
      </div>
    </div>
    <div class="result-stats">
      <div class="rs-box"><div class="rs-num green" id="rs-correct">0</div><div class="rs-label">答對題數</div></div>
      <div class="rs-box"><div class="rs-num red" id="rs-wrong">0</div><div class="rs-label">答錯題數</div></div>
      <div class="rs-box"><div class="rs-num blue" id="rs-pct">0%</div><div class="rs-label">正確率</div></div>
    </div>
    <div class="wrong-section" id="wrong-section"></div>
    <div class="result-actions">
      <button class="btn btn-secondary" onclick="location.reload()">重新開始課程</button>
      <button class="btn btn-primary" onclick="goRegister()">重新測驗</button>
    </div>
  </div>
</div>

<script>
// ═══════════════ SLIDES ═══════════════
const slides = [
{
  chapter:'第一章　新法背景',
  title:'2026年7月1日——新法正式施行',
  subtitle:'職業安全衛生法修正，職場不法侵害預防義務全面強化',
  html:`
  <div class="info-box red">
    <div class="box-title">🔴 修法重點一覽</div>
    <ul>
      <li>原規定：僅勞工人數 <strong>100人以上</strong> 才須訂定預防計畫</li>
      <li><strong>新規定（7/1起）：無論規模大小，所有雇主均有義務採取預防措施</strong></li>
      <li>增訂「執行職務遭受不法侵害預防」為雇主法定安全衛生措施義務</li>
      <li>罰鍰大幅提高，主管人員可能負連帶責任</li>
    </ul>
  </div>
  <div class="card-grid">
    <div class="card red"><div class="card-icon">📜</div><div class="card-title">法規依據</div><div class="card-body">職業安全衛生法第 6 條第 2 項第 3 款（2026年修正）</div></div>
    <div class="card orange"><div class="card-icon">🏢</div><div class="card-title">適用對象</div><div class="card-body">全體事業單位，不論產業別或員工人數</div></div>
    <div class="card blue"><div class="card-icon">👔</div><div class="card-title">主管角色</div><div class="card-body">第一線防線，須主動辨識、預防、處理不法侵害</div></div>
  </div>
  <div class="law-article">

{cat:'法規類',q:'職場不法侵害預防計畫中，下列哪一項「不是」法規要求必須包含的內容？',opts:['危害風險評估','申訴管道及處理程序','員工薪資調整辦法','教育訓練計畫'],ans:2,exp:'預防計畫應包含風險辨識評估、預防措施、申訴及調查處理程序、教育訓練等，員工薪資並非法規要求的計畫內容。'},

{cat:'法規類',q:'若主管對員工申訴後給予不利對待（如降職、調派不當），除違反職安法外，還可能違反哪一法律？',opts:['消費者保護法','性別平等工作法','公司法','勞動基準法第28條'],ans:1,exp:'性別平等工作法明定禁止雇主對申訴者給予報復性不利對待，違反者最高可處150萬元罰鍰，並可命令賠償員工損失。'},
{cat:'法規類',q:'依職安法，「職場不法侵害」的侵害來源可以是哪些人？',opts:['僅限直屬主管','僅限同事','主管、同事、部屬、客戶、廠商等所有相關人員','僅限公司外部人員'],ans:2,exp:'職安法規範的不法侵害來自「他人行為」，包含組織內部（主管、同事、部屬）及外部（客戶、廠商、民眾）所有相關人員。'},
{cat:'法規類',q:'雇主訂定的職場不法侵害預防計畫，應如何讓員工知悉？',opts:['僅需存檔備查','公告於工作場所公布欄或以適當方式通知全體勞工','以電子郵件傳送給主管即可','在新進員工訓練時說明一次即可'],ans:1,exp:'預防計畫應公告於工作場所，或以其他適當方式讓全體勞工了解其內容，確保每位員工都能知悉申訴管道及程序。'},
{cat:'法規類',q:'職場不法侵害的調查過程中，雇主對被申訴人的處置原則為何？',opts:['立即解僱','在調查完成前假定其有罪','給予說明機會，在調查完成前不得懲處','隔離被申訴人，取消其工作資格'],ans:2,exp:'調查期間應遵守無罪推定原則，給予被申訴人說明機會，不可在調查結果確定前即予懲處，但可採取暫時隔離等緩衝措施。'},

{cat:'法規類',q:'「執行職務」期間遭受不法侵害，下列何者「不」屬於職安法保護範圍？',opts:['在公司接待區遭客戶辱罵','出差途中遭合作廠商肢體攻擊','下班後在家自行發生的事故','開會中遭同事言語威脅'],ans:2,exp:'職安法保護的是「執行職務」期間遭受的不法侵害。下班後在家自行發生的私人事故，與執行職務無關，不在保護範圍內。'},
{cat:'法規類',q:'雇主的職場不法侵害預防教育訓練，應多久辦理一次？',opts:['每月一次','每半年一次','每年至少一次','只需在新進員工訓練時辦理'],ans:2,exp:'依法令規定，雇主應定期（每年至少一次）對全體勞工實施職場不法侵害預防教育訓練，讓員工了解相關法規與申訴管道。'},
{cat:'法規類',q:'性騷擾防治法與職安法在職場性騷擾議題上的關係為何？',opts:['兩者互相矛盾，僅能適用其中一種','性騷擾防治法取代職安法相關規定','兩者均可適用，雇主須同時符合兩法規定','職安法優先，性騷擾防治法不適用'],ans:2,exp:'性騷擾屬於職場不法侵害的一種，雇主須同時符合性騷擾防治法（或性別平等工作法）與職安法的相關規定，兩法並行適用。'},
{cat:'法規類',q:'依職安法，下列哪一種情況雇主可被認定已盡到預防不法侵害的義務？',opts:['只要公司張貼了相關標語','訂定預防計畫、設置申訴管道、辦理教育訓練，並確實執行','只要在發生事件後立即處理','只要投保員工意外險'],ans:1,exp:'雇主須訂定計畫、建立申訴管道、辦理訓練並確實執行，僅有形式上的計畫而無實質執行，不能認定已盡法定義務。'},

{cat:'法規類',q:'依法令規定，職場不法侵害預防計畫的訂定過程，應包含哪些人員參與？',opts:['僅人資部門即可','僅安全衛生人員即可','雇主代表及勞工代表共同參與','只需高階主管決定'],ans:2,exp:'預防計畫應由勞雇雙方共同訂定，100人以上設有安全衛生委員會者，應經安全衛生委員會審議，確保計畫內容符合實際需求。'},
{cat:'法規類',q:'若被申訴人為公司最高負責人，申訴處理機制應如何運作？',opts:['直接結案，不予受理','交由直屬部門自行處理','另設獨立調查機制，確保調查公正性','由申訴人自行向法院提告'],ans:2,exp:'當被申訴人為高階主管或負責人時，應啟動迴避機制，由獨立第三方（如外部委員、律師等）主導調查，確保公正性。'},
{cat:'法規類',q:'雇主對於疑似職場不法侵害案件，「不受理申訴」的行為，可能構成哪種違規？',opts:['不構成違規','妨礙申訴權，可能違反職安法及相關勞工法令','違反公司內部規定','違反消防法規'],ans:1,exp:'不受理申訴或阻撓申訴者行使申訴權，違反職安法規定的申訴保障機制，可能遭勞動主管機關裁罰。'},
{cat:'法規類',q:'依職安法，「精神上不法侵害」包含下列哪一種行為？',opts:['合理的工作績效要求','對員工持續進行無端的言語羞辱和孤立','偶發的工作意見不同','依法定假日安排班表'],ans:1,exp:'精神上不法侵害包含持續性的言語羞辱、孤立排擠、恐嚇威脅等造成精神損害的行為，與合理的工作要求有本質上的不同。'},
{cat:'法規類',q:'依法規，主管對員工進行「合理管理」所採取的行為，應具備下列哪個特徵以與霸凌區分？',opts:['必須每天進行','必須有書面記錄','針對工作行為而非人格，具體、一致，並給予改善機會','必須由HR主管執行'],ans:2,exp:'合理管理行為的核心特徵：針對「工作行為/事件」而非「人格特質」，具體說明，對所有人標準一致，並給予改善機會。'},
{cat:'法規類',q:'職場不法侵害事件中，雇主提供心理諮商服務屬於何種義務？',opts:['自願性福利措施','雇主法定的事後支援義務','主管自行決定的裁量事項','僅適用於100人以上大型企業'],ans:1,exp:'依職安法及相關指引，對受害勞工提供心理諮商資源或轉介，是雇主事後支援的法定義務，不論企業規模大小均應辦理。'},

{cat:'實務類',q:'員工私下告訴主管，同組同事長期在午餐時間故意不讓其加入，已持續兩個月。主管應如何處理？',opts:['告訴員工「自己想太多了」','勸說員工要和同事搞好關係','認真看待此訊息，了解詳情並依申訴程序處理','召集全組開會公開討論此事'],ans:2,exp:'員工描述的情境符合職場霸凌（持續孤立）的特徵，主管應認真受理，了解詳情後依申訴程序處理，並保護員工隱私。'},
{cat:'實務類',q:'主管在部門群組聊天室貼出某員工被客訴的資訊，並附上「這種服務水準真讓我丟臉」。這是否構成不法侵害？',opts:['不構成，因為是工作相關內容','不構成，因為只是訊息分享','構成，屬言語暴力及公開羞辱','構成，但只有在員工回覆投訴時才算'],ans:2,exp:'在群組公開發表貶損員工人格的言論（「丟臉」），已超越合理指正範圍，構成言語暴力及公開羞辱，屬職場不法侵害。'},
{cat:'實務類',q:'業務員反映，在拜訪客戶時，客戶以帶有性別歧視的言語持續騷擾她，主管應怎麼做？',opts:['請她下次注意穿著打扮','告訴她這是業務工作常見的事','傾聽並記錄，告知她可申訴，協助她調整客戶安排並提供支援','叫她自己向客戶反映'],ans:2,exp:'顧客性別歧視言語屬職場不法侵害（顧客暴力＋性騷擾），主管應受理、記錄，協助員工調整工作安排，並提供必要支援。'},
{cat:'實務類',q:'某員工向主管申訴遭同事霸凌。主管決定先「非正式」勸說雙方和解，未啟動正式申訴程序。這樣做的問題是？',opts:['沒有問題，這是最有效的方式','節省了公司資源','可能造成受害者持續受害，且違反雇主的法定調查義務','和解通常比調查更公平'],ans:2,exp:'主管逕行「私下調解」而不啟動正式程序，可能使受害者持續承壓，且違反雇主依法建立調查機制的義務，若日後申訴升溫，主管可能面臨法律責任。'},
{cat:'實務類',q:'主管在管理過程中，每天以私訊要求員工回報「今日所有工作細節」，員工感到窒息和被監控。這可能構成何種不法侵害？',opts:['不構成，這是合理管理','構成職場霸凌（心理騷擾、過度監控）','構成物理性暴力','構成性騷擾'],ans:1,exp:'過度且不合理的監控（超出工作所需），會造成員工持續精神壓力，屬於心理騷擾，可能構成職場不法侵害。'},
{cat:'實務類',q:'員工申訴主管後，主管將其調往較差的工作班別。此舉構成什麼？',opts:['合法的工作調度','對申訴者的報復性不利對待，違法','主管享有的人事裁量權','臨時性的工作安排'],ans:1,exp:'對申訴者進行報復性調動，是明確的不利對待，違反職安法保障申訴者的規定，亦可能違反性別平等工作法。'},
{cat:'實務類',q:'HR收到一份匿名申訴，指控某主管有霸凌行為。公司應如何處理匿名申訴？',opts:['匿名申訴無效，直接不予受理','調查匿名者身分後再決定','依職案件嚴重性評估是否啟動調查，即使匿名也應認真對待','只要被申訴者否認即可結案'],ans:2,exp:'匿名申訴仍應認真評估，若情節嚴重或有具體事實，雇主仍應啟動調查或進行非正式了解，不能以「匿名」為由全部拒絕受理。'},
{cat:'實務類',q:'主管在績效面談時，說：「你這季表現不及預期，我需要你說明改善計畫。」這是否構成不法侵害？',opts:['構成，績效面談本身就是壓力','構成，主管有權力優勢','不構成，這是正常的績效管理行為','需視員工是否感到壓力而定'],ans:2,exp:'依具體目標進行績效面談並要求說明改善計畫，是正當合理的管理行為，不構成不法侵害，因為它針對的是工作表現而非人格。'},
{cat:'實務類',q:'員工反映，下班後主管仍透過通訊軟體頻繁傳送工作要求，且如果未立即回覆就會被記過。這屬於何種職場問題？',opts:['不是問題，現代職場本來如此','工作時間以外的騷擾，可能構成精神上不法侵害','只是公司文化問題','完全屬於員工自己的時間管理問題'],ans:1,exp:'強制要求員工在休息時間回應工作訊息，並以懲罰威脅，造成員工持續精神壓力，屬於心理騷擾，可構成精神上不法侵害。'},
{cat:'實務類',q:'調查不法侵害案件時，調查委員會包含的成員應具備什麼特性？',opts:['全由加害人單位的主管組成','越少越好以保密','應具獨立性，成員不得與當事人有利益衝突，宜含外部委員','全由HR部門處理即可'],ans:2,exp:'調查委員會應具獨立性，成員不得與當事人有直接利益衝突，100人以上企業宜納入外部專業人士（如律師、心理師），以確保調查公正。'},
{cat:'實務類',q:'員工告知主管，在茶水間曾遭某同事言語性騷擾，但她不確定要不要申訴。主管應如何回應？',opts:['替她決定不要申訴，免得麻煩','立即公告此事讓大家知道','說明申訴流程及保護機制，讓她自行決定是否申訴，並確保無論如何都不會受到不利對待','叫她自己查公司規定'],ans:2,exp:'主管應提供完整的申訴資訊與保護說明，讓員工在了解且安心的情況下自行決定，不可替她決定，也不可擅自公告。'},
{cat:'實務類',q:'部門中有員工向主管反映，覺得某位同事「很討人厭」，但無法說出具體行為。這是否構成主管應介入的不法侵害？',opts:['主管應立即啟動調查程序','不一定，主管應進一步了解是否有具體不當行為，才能判斷是否構成不法侵害','直接調離其中一人','完全不需要理會'],ans:1,exp:'主觀上「覺得不喜歡」，若無具體不當行為（如持續孤立、羞辱等），尚未構成不法侵害。主管應進一步了解是否有具體行為，才能判斷。'},
{cat:'實務類',q:'主管在得知有員工申訴後，立刻召集當事人「開會化解誤會」，未啟動正式程序。正確的做法應為？',opts:['召集開會是最有效率的方式','應立即通報HR，依預防計畫的正式申訴程序處理，主管不應逕行調停','請雙方寫書面說明即可','等HR通知再說'],ans:1,exp:'主管逕行調停可能破壞調查中立性，且可能使受害者承壓。正確做法是立即通報HR，啟動正式申訴調查程序。'},
{cat:'實務類',q:'企業舉辦尾牙，某主管在活動中對同事進行帶有性別歧視的戲謔。這是否屬於職場不法侵害？',opts:['不屬於，因為是公司活動場合','不屬於，因為是玩笑性質','屬於，公司活動屬於工作相關情境，性別歧視言論構成性騷擾或不法侵害','需視被說者是否當場反對'],ans:2,exp:'公司舉辦的活動屬於工作相關情境，在此場合發生的性別歧視或騷擾行為，仍構成職場不法侵害，雇主應採取預防措施。'},
{cat:'實務類',q:'主管發現兩名員工之間有激烈爭執，但雙方都說「只是在討論工作」。主管應？',opts:['完全相信他們，不需介入','觀察後續，若無事則不需處理','評估是否有持續性衝突或權力不對等情況，必要時主動了解或建議透過申訴管道處理','要求雙方書面說明後存檔'],ans:2,exp:'主管不應僅以當事人的說法判斷，應評估是否有持續性問題；若有疑慮，可主動了解或告知員工申訴管道，避免潛在問題惡化。'},
{cat:'實務類',q:'下列哪種說法正確描述了職場霸凌與一般人際衝突的差別？',opts:['兩者沒有區別','職場霸凌一定要有肢體接觸','職場霸凌具有持續性、重複性，且通常存在權力不對等；一般衝突是偶發的','職場霸凌只發生在主管對部屬之間'],ans:2,exp:'職場霸凌的核心特徵是持續性、重複性及權力不對等；一般人際衝突通常是偶發且雙向的。這是判斷是否構成霸凌的重要依據。'},
{cat:'實務類',q:'一名員工因長期遭受職場霸凌，導致罹患憂鬱症並需就醫。雇主的民事責任可能包含？',opts:['不需負任何賠償','僅需支付醫療費用','損害賠償（含醫療費、工作損失），以及精神慰撫金','只需讓員工停職休息'],ans:2,exp:'雇主若未盡預防義務，對受害勞工的損害（醫療費、工作損失、精神慰撫金）可能須負民事損害賠償責任，金額可能相當龐大。'},
{cat:'實務類',q:'下列哪種主管行為屬於「合理管理」，不構成不法侵害？',opts:['當眾貶低員工人格','對同一員工持續無端的嚴厲指責','對遲到員工依規定給予書面警告，並具體說明改善要求','剝奪員工應有的休息時間'],ans:2,exp:'依明確規定，針對具體行為（遲到）給予書面警告並說明改善要求，是標準管理行為，有具體事實依據且一致適用，不構成不法侵害。'},
{cat:'實務類',q:'主管應如何協助剛受到顧客言語暴力的員工？',opts:['叫他繼續工作，不能影響業績','提供支持性傾聽，讓員工暫時離開現場，告知其申訴或回報的權利','告訴他這是業務工作本來的一部分','要求他自己向客戶道歉'],ans:1,exp:'第一步是提供情緒支持和安全空間，讓員工暫時離開緊張情境，再告知其相關申訴或回報機制，主管不應貶低員工的感受。'},
{cat:'實務類',q:'某員工在群組聊天室中傳播關於同事私生活的謠言，造成該同事心理受創。這屬於哪種不法侵害？',opts:['不構成，網路行為不屬於職場','言語暴力及名譽毀損（構成職場不法侵害）','只有在工作時間內才構成','屬於民事糾紛，公司無需介入'],ans:1,exp:'即使透過網路通訊，若發生在工作相關情境（如公司群組），傳播謠言造成當事人名譽及心理損害，構成職場不法侵害。'},
{cat:'實務類',q:'主管應如何正確地告知員工有關職場不法侵害的申訴管道？',opts:['只在發生事件後才說明','只需放在公告欄，不需主動說明','在日常教育訓練中定期提醒，確保員工了解申訴流程及保護機制','只告訴可能遭受侵害的員工'],ans:2,exp:'申訴管道應在教育訓練中主動向全體員工說明，而不是發生事件後才告知，確保員工在需要時知道如何求助。'},
{cat:'實務類',q:'主管在私下告訴部屬：「如果你敢去HR申訴，我保證讓你的日子不好過。」這構成何種行為？',opts:['正常的主管提醒','合法的警告行為','報復威脅，屬重大違法，可能構成強制罪及違反職安法','只是氣話，不構成任何問題'],ans:2,exp:'以威脅方式阻止員工行使申訴權，屬明確的報復性威脅，違反職安法，情節嚴重可能構成刑法強制罪，主管面臨嚴重法律風險。'},
{cat:'實務類',q:'若員工在申訴過程中要求匿名，雇主應如何處理？',opts:['告知員工匿名無效，必須具名才受理','盡量保護申訴人身分，僅限調查相關人員知悉，並告知員工保密的限制','直接公開申訴人身分以便調查','要求申訴人自行追蹤結果'],ans:1,exp:'雇主應盡量保護申訴人身分，限縮知悉範圍；但若需要進行調查，可能無法完全匿名，應誠實告知保密的限制，取得申訴人理解。'},
{cat:'實務類',q:'主管在確認員工的申訴後，正確的首要行動應為？',opts:['自行評估申訴是否成立，若認為不嚴重則不通報','立即通報人資/職安主管，並採取必要的緊急保護措施','先通知被申訴者讓他準備說法','在部門內部開會讓大家知道此事'],ans:1,exp:'收到申訴後，主管的首要行動是立即通報HR或職安主管，啟動正式流程，並視必要性採取緊急保護措施（如隔離當事人）。'},
{cat:'實務類',q:'員工完成申訴後，主管的後續追蹤責任包含？',opts:['申訴結案即完成所有責任','定期關心受害者工作狀況及身心健康，確認沒有持續受到不利對待','只需等待下一次申訴','將員工調往其他部門即可'],ans:1,exp:'申訴處理後，主管仍須持續追蹤受害者的身心狀況，確認工作環境安全，並防止加害者的報復行為，這是長期的管理責任。'},
// ── 法規類補充 26-50 ──
,{cat:'法規類',q:'依職安法，雇主對職場不法侵害的預防義務，屬於下列哪一種法律性質？',opts:['鼓勵性措施，未達標不罰','自願性企業社會責任','法定強制義務，違反可裁罰','勞資雙方協議事項'],ans:2,exp:'職安法第6條第2項屬於強制性規定，雇主有法定義務採取必要預防措施，違反者可依法裁罰。'}
,{cat:'法規類',q:'依法規指引，職場不法侵害預防計畫至少應包含哪項「風險評估」內容？',opts:['評估員工薪資風險','辨識工作場所中可能發生不法侵害的高風險情境及作業','評估公司財務風險','評估機械設備損耗'],ans:1,exp:'預防計畫應包含危害辨識與風險評估，具體列出哪些工作場所、職務或情境存在較高的不法侵害風險，並據此制定預防措施。'}
,{cat:'法規類',q:'雇主對於通報或申訴職場不法侵害的勞工，依法絕對禁止採取何種行動？',opts:['給予心理諮商支援','進行事實調查','給予解僱、降職、減薪等不利對待','告知申訴後續流程'],ans:2,exp:'職安法及性別平等工作法均明定，雇主不得對申訴者或提供調查資訊者給予任何不利對待，違反者可處高額罰鍰。'}
,{cat:'法規類',q:'職場不法侵害案件的調查委員會，在人員組成上應如何確保「公正性」？',opts:['由被申訴人自行選擇委員','委員全由HR部門擔任','委員不得與當事人有利益衝突，宜納入獨立外部委員','由直屬單位主管主持'],ans:2,exp:'調查公正性的核心要求：委員須與案件當事人無利益衝突；企業規模較大或案情複雜時，宜納入外部法律或心理專業人士。'}
,{cat:'法規類',q:'依相關法規，雇主訓練計畫中的職場不法侵害教育訓練，應包含哪些對象？',opts:['僅主管階層','僅HR及安全衛生人員','僅新進員工','全體勞工（含主管）均應接受訓練'],ans:3,exp:'教育訓練對象應涵蓋全體勞工，包含各級主管、一般員工及新進員工，確保所有人了解不法侵害的辨識、預防及申訴程序。'}
,{cat:'法規類',q:'依職安法，「身體上的不法侵害」包含下列哪一種行為？',opts:['合理調整工作內容','以言語持續批評工作品質','以肢體動作推擠或打傷員工','要求員工提交工作報告'],ans:2,exp:'身體上的不法侵害指對人體造成直接傷害或威脅的行為，如推擠、毆打、投擲物品等肢體性攻擊行為。'}
,{cat:'法規類',q:'職場不法侵害預防相關法規中，「執行職務」的認定範圍，下列何者「不包含」在內？',opts:['在公司辦公室工作','出差期間執行業務','參加公司舉辦的教育訓練','完全私人的假日活動'],ans:3,exp:'「執行職務」的範圍包含在工作場所、出差途中、參加公司活動等工作相關情境；純私人假日活動（與工作完全無關）不在其內。'}
,{cat:'法規類',q:'主管在調查不法侵害案件期間，對被申訴人採取「暫時調離原工作崗位」的措施，其法律性質為何？',opts:['屬於懲處，須先完成調查才能為之','屬於保護雙方的暫時緊急措施，不等同懲處','屬於違法行為','需要申訴人同意才能執行'],ans:1,exp:'調查期間的暫時隔離措施是保護性手段，目的在於防止二次傷害並維護調查中立性，不代表認定被申訴人有罪，不等同懲處。'}
,{cat:'法規類',q:'依相關法規，職場不法侵害的申訴管道應具備哪項特性？',opts:['只能以書面申訴','申訴人須公開身分才受理','多元且保密，讓勞工能安心反映問題','僅能向直屬主管申訴'],ans:2,exp:'申訴管道應具多元性（書面、電話、電子郵件等）及保密性，確保勞工不因身分曝光而顧慮，阻礙其行使申訴權。'}
,{cat:'法規類',q:'若勞工不滿意雇主對不法侵害申訴案的處理結果，可向哪個機關申訴？',opts:['地方法院','健保署','勞動部或地方勞動主管機關','監察院'],ans:2,exp:'勞工對雇主處理不服，可向勞動部或地方政府勞動局（處）申訴，要求主管機關介入調查或進行勞資調解。'}
,{cat:'法規類',q:'「職場性騷擾」在法規上同時受哪些法律規範？',opts:['僅職安法','僅性騷擾防治法','職安法、性別平等工作法及性騷擾防治法均可適用','僅刑法'],ans:2,exp:'職場性騷擾同時受職安法（不法侵害預防）、性別平等工作法（職場性騷擾防治）及性騷擾防治法三者規範，雇主須同時符合各法要求。'}
,{cat:'法規類',q:'依職安法，雇主應依何原則選定職場不法侵害的預防措施？',opts:['以最低成本為原則','以最高效率為原則','以必要性及有效性為原則，妥為規劃','隨主管自由心證決定'],ans:2,exp:'職安法要求雇主「妥為規劃及採取必要之安全衛生措施」，必要性與有效性是評估措施是否符合法定義務的核心標準。'}
,{cat:'法規類',q:'雇主委託外部機構（如律師事務所）協助調查職場不法侵害案件，其法律責任由誰承擔？',opts:['外部機構完全承擔','雇主完全承擔','雇主仍承擔最終雇主責任，外部機構協助執行','由員工共同承擔'],ans:1,exp:'委託外部機構協助調查並不免除雇主的法定責任；雇主仍是最終責任人，外部機構僅為執行輔助角色。'}
,{cat:'法規類',q:'依職安法及相關指引，職場不法侵害的「高風險作業」通常包含哪一類型？',opts:['一般行政文書工作','需要獨自面對客戶（尤其是不特定公眾）的工作','需要使用電腦的工作','倉儲整理作業'],ans:1,exp:'直接面對不特定客戶/民眾的工作（如客服、醫療、社工、收費員等）是顧客暴力的高風險族群，應在預防計畫中特別規劃保護措施。'}
,{cat:'法規類',q:'職場不法侵害事件中，若加害人同時也是目擊者，調查程序應如何進行？',opts:['以加害人的說詞為主','不採信加害人的陳述，直接認定其有罪','調查委員會應收集多方證據，不以單一來源為依據','要求申訴人自行取得其他證據'],ans:2,exp:'調查應廣泛收集多方資訊（申訴人、被申訴人、目擊者、相關紀錄），不以單一來源決定事實，確保調查結論有充分的事實依據。'}
,{cat:'法規類',q:'依法規，雇主在訂定職場不法侵害預防計畫時，應如何取得勞工代表意見？',opts:['不需諮詢勞工','僅需主管層級同意即可','應透過勞工代表或安全衛生委員會參與，聽取勞工意見','只需張貼公告讓員工看到'],ans:2,exp:'預防計畫宜透過勞資協商機制（如安全衛生委員會、勞工代表）確保勞工意見被納入，增加計畫的可信度與員工的遵從意願。'}
,{cat:'法規類',q:'若員工在申訴調查完成前即離職，雇主的調查義務為何？',opts:['員工離職即可終止調查','應繼續完成調查，以對在職員工盡保護義務，並作為改善依據','由員工自行向法院提告','將案件移交警察處理'],ans:1,exp:'雇主的調查義務不因申訴人離職而消滅，仍應完成調查以保護其他在職員工，並作為改善職場環境及防止再發的依據。'}
,{cat:'法規類',q:'依職安法修正後，雇主「每年」應就職場不法侵害預防計畫採取何種管理行動？',opts:['完全不需要更新','每年至少進行一次計畫的複查及修訂，確保計畫仍具有效性','每五年更新一次','只在發生事件後才更新'],ans:1,exp:'預防計畫應定期（每年至少一次）複查，評估其有效性，並依職場環境變化、新增風險或事件經驗進行修訂更新。'}
,{cat:'法規類',q:'職場不法侵害申訴案件調查結果確定後，雇主對加害者的懲處應依何原則？',opts:['一律最重懲處','一律警告即可','依行為嚴重性採比例原則，給予適當懲處','由申訴人決定懲處方式'],ans:2,exp:'懲處應遵守比例原則：依行為嚴重程度、頻率、影響範圍等因素，選擇適當的懲處手段（口頭警告至解僱），避免過輕或過重。'}
,{cat:'法規類',q:'依職安法，雇主對職場不法侵害的預防措施，是否可以主張「已建立制度但員工不遵守」而免責？',opts:['可以完全免責','不可以，雇主仍須確認制度確實執行','可以部分免責','由法院個案認定'],ans:1,exp:'雇主不能僅以訂定制度為由免責；法定義務要求「確實執行」，若能證明已積極執行且定期稽核，可降低法律風險，但不能完全免責。'}
,{cat:'法規類',q:'下列哪一種行為屬於主管「合法行使管理權」，不構成職場不法侵害？',opts:['在會議中當眾羞辱員工讓其感到丟臉','以言語威脅員工若不加班就解僱','依公司規定對遲到超過三次的員工發出書面警告','孤立員工使其無法獲得工作所需資訊'],ans:2,exp:'依公司既有規定，針對明確違規行為（遲到）依程序發出書面警告，是合理且一致的管理行為，具體、有據，不構成不法侵害。'}
,{cat:'法規類',q:'職場不法侵害預防計畫中，對「顧客暴力」的預防措施，下列何者最為適切？',opts:['要求員工自行處理客戶衝突','訓練員工忍耐客戶不當行為','訂定應對程序、提供員工請求支援的機制，並明確告知不接受暴力行為','僅依賴警衛保護'],ans:2,exp:'顧客暴力預防應包含：訓練員工識別並安全應對暴力風險、設計支援呼叫機制、明確告知客戶可接受的行為界線，及事後支援。'}
,{cat:'法規類',q:'依職安法，勞工若遭受職場不法侵害，除可向雇主申訴外，還可直接向哪些機關尋求協助？',opts:['僅向公司內部申訴，不得外部求助','向勞動主管機關申訴、或依民刑事途徑向司法機關求助','僅向調解委員會申請','只能等待公司自行處理'],ans:1,exp:'勞工除公司內部申訴外，可向地方勞動主管機關申訴、向法院提起民事侵權損害賠償，或視情節向檢察機關提出刑事告訴。'}
,{cat:'法規類',q:'下列何者是職安法對「精神不法侵害」的正確認識？',opts:['精神損害無法量化，因此不受法律保護','精神不法侵害需有醫師診斷書才能成立','持續性的言語羞辱、孤立等造成精神壓力的行為，受職安法明確保護','精神侵害只有在需要住院時才算'],ans:2,exp:'職安法第6條明定保護「精神上」的不法侵害，只要行為具有持續性且造成受害者精神上的損害，即可構成，不以醫療診斷為唯一要件。'}
// ── 實務類補充 26-50 ──
,{cat:'實務類',q:'主管在一對一面談中，對員工說：「你再這樣下去，我會確保你在這個業界找不到工作。」這構成什麼？',opts:['正常的職場警告','屬於過激但合法的管理行為','以未來職涯威脅員工，構成精神上的不法侵害及強制行為','只要沒有肢體動作就不算'],ans:2,exp:'以損害對方未來職業發展作為威脅手段，超越合理管理範圍，造成精神恐懼，構成精神上的不法侵害，嚴重者可能觸犯刑法強制罪。'}
,{cat:'實務類',q:'員工A向主管反映，同事B每天都會在走廊上故意撞她。主管應優先採取什麼行動？',opts:['告訴A「可能是不小心的」','讓A自己跟B說','立即記錄此訊息並通報HR啟動申訴程序，同時詢問A是否有身體傷害需要醫療處理','等看看下次是否還會發生'],ans:2,exp:'肢體性的故意碰撞屬身體不法侵害，主管應立即認真受理，記錄後通報HR啟動程序，並確認員工是否有身體傷害需要處理。'}
,{cat:'實務類',q:'主管注意到一名員工近期請假次數增多、工作表現退步，詢問後得知他正在被同組同事孤立。主管此時應？',opts:['請員工轉調其他部門解決問題','告訴員工要自己解決人際關係','傾聽員工，記錄詳情，告知其申訴權利，並主動了解是否有持續性的排擠行為','鼓勵員工更積極與同事互動'],ans:2,exp:'員工出現這類訊號時，主管應認真傾聽，了解是否有持續性孤立行為（符合霸凌特徵），記錄並告知申訴權利，而非輕描淡寫或轉移問題。'}
,{cat:'實務類',q:'公司推行高績效文化，主管習慣在失誤時在全組面前大聲斥責員工。這種管理方式的問題是？',opts:['沒有問題，這是激勵員工的好方法','可能構成公開羞辱，屬言語不法侵害，且破壞職場心理安全感','只有被罵的人才有問題，其他人不受影響','只要績效好，方式不重要'],ans:1,exp:'在眾人面前大聲斥責員工（而非私下給予具體建議），屬於公開羞辱，可構成言語不法侵害，且會破壞整體職場的心理安全感。'}
,{cat:'實務類',q:'某員工要求主管調查同事對她的騷擾，主管卻說：「你們感情這麼好，怎麼可能？算了吧。」這種回應有什麼問題？',opts:['沒問題，主管是在緩和情緒','沒問題，主管以自身觀察判斷','主管以個人主觀認知否定申訴，未盡受理及調查義務，可能違法','主管太忙是可以理解的'],ans:2,exp:'主管以「感情好」否定申訴，是以主觀判斷替代正式調查，違反申訴受理義務；加害人與受害人的外顯關係不能作為否定申訴的依據。'}
,{cat:'實務類',q:'職場不法侵害預防計畫規定，主管收到申訴後應在24小時內通報HR，但主管拖了一週才告知。這會造成什麼法律風險？',opts:['不會有任何問題','可能造成受害者持續受害，主管可能被認定未善盡職責而承擔連帶責任','只要最後通報了就沒問題','只要解釋原因就可免責'],ans:1,exp:'延誤通報可能使受害者在這段期間持續受害，主管可能因未善盡法定程序，被認定為放任行為持續，面臨連帶責任風險。'}
,{cat:'實務類',q:'主管在確認員工提出正式申訴後，應立即採取的「書面化」措施是？',opts:['不需要任何書面記錄','以口頭告知HR即可','記錄申訴的日期、時間、申訴人、被申訴人及主要內容，並保存於適當檔案','請申訴人自己寫報告給主管看'],ans:2,exp:'書面記錄申訴的關鍵資訊（時間、人員、事件概述），是保護申訴人、確保調查有據可查的重要步驟，亦是法定程序的一部分。'}
,{cat:'實務類',q:'主管在知悉不法侵害事件後，最不應該做的事是？',opts:['告知申訴人後續流程','採取緊急隔離措施','私下通知被申訴人「有人在告你，你準備一下」','保存相關紀錄'],ans:2,exp:'提前通知被申訴人可能使其與申訴人溝通施壓、湮滅證據或找人說情，嚴重破壞調查中立性，是主管絕對不應該做的事。'}
,{cat:'實務類',q:'員工在辭職時透露，他在職期間曾多次遭受主管語言暴力，但從未正式申訴。公司應如何看待這個情況？',opts:['員工已離職，不需再處理','退出申訴，案件自動終結','認真看待離職面談資訊，評估是否有系統性問題，必要時主動調查以保護現有員工','此屬個人恩怨，公司不介入'],ans:2,exp:'離職員工的陳述提供了重要訊號，公司應評估是否有系統性問題（如相關主管的管理行為），並採取措施保護現在仍在職的員工。'}
,{cat:'實務類',q:'主管發現部門中資深員工長期對新進員工「指點江山」，語氣傲慢且常有貶低言語，主管應？',opts:['認為這是資深員工帶人的方式，不介入','等新員工自己適應','主動與資深員工溝通，說明適當帶人方式，並關心新員工感受，若情況嚴重則啟動申訴程序','等待員工申訴再說'],ans:2,exp:'主管有主動維護職場健康文化的責任，不應等待事件惡化才處理；提早介入說明期望的帶人行為，是預防霸凌的積極作為。'}
,{cat:'實務類',q:'為預防顧客暴力，客服部門主管在訓練中可以教導員工哪些應對技巧？',opts:['無論何種情況都要忍耐客戶','如實告知客戶「你這樣說話我覺得不舒服，請您平靜溝通，否則我將結束這次通話」','主動向客戶道歉以平息怒氣','忽略客戶的不當言語繼續服務'],ans:1,exp:'員工有權在受到不當對待時，以清楚且禮貌的方式告知客戶，並在必要時結束互動。主管應訓練員工能自我保護，並設計相關支援機制。'}
,{cat:'實務類',q:'公司新上任的主管，首要應了解的職場不法侵害相關事項是？',opts:['公司上一季的財務報表','公司的職場不法侵害預防計畫內容、申訴程序及自己的處理責任','公司的薪資結構','辦公室設備的使用規定'],ans:1,exp:'新主管應立即了解公司預防計畫的內容、申訴管道、自己收到申訴後的處理步驟，以及自身言行須符合哪些標準，這是履行法定義務的基礎。'}
,{cat:'實務類',q:'主管想評估自己的管理行為是否可能構成不法侵害，最有效的自我檢核方式是？',opts:['問最親近的部屬「我是否有問題」','只要績效好就代表管理方式正確','想像「若這段管理對話被錄音播給外部第三者聽，是否仍屬合理管理」','不需要自我檢核，按照感覺管理即可'],ans:2,exp:'「第三者聽起來是否合理」是有效的自我檢核標準，若這段話/行為對外部旁觀者聽來會感到不適，很可能已超越合理管理範圍。'}
,{cat:'實務類',q:'部門同事私下告訴主管，他觀察到另一名員工正在遭受同事霸凌，但不願出面作證。主管應如何處理？',opts:['告知目擊者若不作證就無法調查','將目擊者身分告知被申訴人','記錄此資訊，評估是否有其他方式蒐集事實，並確保目擊者不因協助調查而受到不利對待','要求目擊者自行決定，不介入'],ans:2,exp:'主管應記錄此線索，依照其他管道評估事件，並向目擊者保證提供資訊不會有不利後果，降低其顧慮，創造安全的陳述環境。'}
,{cat:'實務類',q:'公司的職場不法侵害預防教育訓練，除了知識傳授外，最重要的目標是？',opts:['讓員工了解法規條文可以考試','改變員工態度，建立「不法侵害不可接受」的職場文化','讓HR減少處理案件的負擔','降低公司被裁罰的風險'],ans:1,exp:'訓練的最終目標是建立「職場不法侵害不可接受」的共識文化，讓每個人都成為預防者，而不只是讓員工記住法規內容。'}
,{cat:'實務類',q:'主管在收到員工申訴後，對申訴內容高度存疑，認為員工在誇大。主管應如何處理？',opts:['直接告訴員工他在誇大','私下了解後認為沒問題，不通報HR','即使存疑，仍應依程序通報HR，由調查程序來判斷事實，主管不應自行裁斷','等員工再申訴一次確認是否認真'],ans:2,exp:'主管不是調查者，不應自行判斷申訴真偽而決定是否通報。正確做法是依程序通報，由調查程序中收集事實，讓中立調查委員會做出判斷。'}
,{cat:'實務類',q:'如何區分「有壓力但正常的工作環境」與「職場霸凌」？',opts:['有壓力就是霸凌','有業績要求就是霸凌','工作壓力若源自合理的工作要求，非針對個人且無惡意，通常不構成霸凌','只要員工覺得有壓力就算霸凌'],ans:2,exp:'正常的工作壓力（如業績目標）是組織運作的一部分；霸凌的特徵在於「針對特定個人」、「超出合理範圍」、「帶有惡意或持續性」，兩者有本質差異。'}
,{cat:'實務類',q:'一名主管因個人情緒問題，對某員工的工作提出不成比例的嚴厲批評，當場令其落淚。事後主管道歉。這是否解決了問題？',opts:['道歉後即解決，不需進一步處理','道歉有助改善，但若此行為屬第一次且孤立事件，應觀察後續；若是一再發生的模式，公司仍應介入處理','道歉後無需任何後續','只要員工接受道歉就可結案'],ans:1,exp:'單次的不當行為經道歉後可能修復關係，但若屬持續性模式，道歉不足以解決問題，公司應介入，要求主管接受管理訓練或啟動申訴程序。'}
,{cat:'實務類',q:'主管在收到員工不法侵害申訴後，可以向哪些人揭露申訴內容？',opts:['可以告訴部門所有同事以了解情況','可以告訴自己的朋友以尋求建議','僅限HR、上級及調查委員會等需要知悉以處理案件的人員','可以告訴被申訴人的直屬主管作為人事參考'],ans:2,exp:'申訴資訊應嚴格保密，只分享給有必要知悉以處理案件的人員（HR、調查委員等），多餘揭露可能侵害當事人隱私，違反保密義務。'}
,{cat:'實務類',q:'部門成員在非工作時間的私人社群媒體上，發布針對特定同事的負面評論，並公開其個人隱私。主管應如何看待此事？',opts:['與工作無關，公司不介入','只要不在上班時間就完全不管','若與工作相關（如當事人）或已影響職場人際關係，雇主仍應介入評估是否構成職場不法侵害','社群媒體完全屬於私人空間，法律不保護'],ans:2,exp:'即使在非工作時間的社群媒體，若行為對象是工作場所同事且影響工作環境（如造成孤立、恐懼），雇主仍有義務評估介入，判斷是否構成不法侵害。'}
,{cat:'實務類',q:'職場不法侵害申訴案件調查完成後，雇主應以何種方式告知申訴人結果？',opts:['無需告知，等申訴人自己問','僅告知「已處理完畢」','告知調查結論及雇主採取的處置措施，但須考量隱私，不全盤公開被申訴人的懲處細節','在部門全體會議上公開宣布'],ans:2,exp:'申訴人有權知悉調查結論及雇主採取的處置，但需考量被申訴人的隱私；一般做法是告知申訴是否成立及雇主採取了哪類措施，不必揭露懲處細節。'}
,{cat:'實務類',q:'主管如何在日常管理中「積極預防」職場不法侵害，而非只是被動等待申訴？',opts:['設置監控攝影機，24小時記錄員工互動','定期進行部門氣氛觀察、一對一面談，主動了解員工互動是否有異常','要求員工每日回報是否有被侵害','招募更多主管來監視員工'],ans:1,exp:'積極預防包含：定期觀察部門人際動態、進行一對一面談了解員工感受、對孤立或冷漠等訊號保持敏感，在問題擴大前及早介入。'}
,{cat:'實務類',q:'員工因害怕被報復而不敢申訴，主管可以採取哪些行動來增加員工的申訴意願？',opts:['告訴員工「沒有人會被報復」但不做任何具體保護措施','公開表示對申訴人的支持，確保既有案例中申訴者未受到不利對待，並說明具體保護機制','只能依賴匿名申訴管道','要求員工勇敢面對'],ans:1,exp:'增加申訴意願需要具體行動：公開宣示反報復立場、讓員工看到申訴後確實受到保護的實例，並說明具體的保護機制（如調查期間的隔離措施）。'}
,{cat:'實務類',q:'主管自己受到上級主管不法侵害，應如何尋求協助？',opts:['忍耐，以免影響職涯','向加害者的主管反映，但不要正式申訴','依公司申訴程序，透過HR或設置的獨立申訴管道正式提出申訴','因為是主管，所以沒有申訴權'],ans:2,exp:'任何員工，包含主管，都有申訴不法侵害的權利。遭受上級不當對待時，應依公司申訴程序通報HR或使用獨立管道，必要時可向勞動主管機關申訴。'}
];

// ═══════════════ GOOGLE SHEETS ═══════════════
const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxqcqmsgIvVXtISxxxihFtDaIGzwjq8vgR1ujESeklIdDrjHzuUpBFaryEjWEi2C7F82w/exec';

// ═══════════════ STATE ═══════════════
let currentSlide = 0;
let visitedSlides = new Set([0]);
let quizQuestions = [];
let answers = {};
let currentQ = 0;
let quizTimer = null;
let secondsLeft = 1800;
let startTime = null;
let userData = {};

// ═══════════════ NAVIGATION ═══════════════
function show(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById('screen-'+id).classList.add('active'); }
function goSlides(){ show('slide'); renderSlide(); }
function goRegister(){ show('register'); }

function buildSidebar(){
  const nav = document.getElementById('sidebar-nav');
  let lastChapter = '';
  nav.innerHTML = slides.map((s,i)=>{
    let ch = '';
    if(s.chapter !== lastChapter){ lastChapter=s.chapter; ch=`<div class="nav-chapter">${s.chapter}</div>`; }
    return `${ch}<div class="nav-item ${i===currentSlide?'active':''}" onclick="jumpSlide(${i})"><span class="num">${i+1}</span>${s.title}</div>`;
  }).join('');
}

function jumpSlide(i){ visitedSlides.add(i); currentSlide=i; renderSlide(); }

function renderSlide(){
  const s = slides[currentSlide];
  document.getElementById('slide-chapter-badge').textContent = s.chapter;
  document.getElementById('slide-num-text').textContent = `${currentSlide+1} / ${slides.length}`;
  document.getElementById('slide-content').innerHTML = `<h1 class="slide-title">${s.title}</h1><p class="slide-subtitle">${s.subtitle}</p>${s.html}`;
  buildSidebar();
  const fill = Math.round((visitedSlides.size/slides.length)*100);
  document.getElementById('sidebar-progress').style.width = fill+'%';
  document.getElementById('sidebar-progress-text').textContent = `${visitedSlides.size} / ${slides.length} 已瀏覽`;
  document.getElementById('btn-prev').disabled = currentSlide===0;
  const isLast = currentSlide===slides.length-1;
  const btn = document.getElementById('btn-next');
  if(isLast){ btn.textContent='進入測驗 →'; btn.className='btn btn-primary'; btn.onclick=goRegister; }
  else{ btn.textContent='下一頁 →'; btn.className='btn btn-primary'; btn.onclick=nextSlide; }
}
function nextSlide(){ if(currentSlide<slides.length-1){ currentSlide++; visitedSlides.add(currentSlide); renderSlide(); } }
function prevSlide(){ if(currentSlide>0){ currentSlide--; visitedSlides.add(currentSlide); renderSlide(); } }

// ═══════════════ QUIZ ═══════════════
function startQuiz(){
  const name=document.getElementById('reg-name').value.trim();
  const dept=document.getElementById('reg-dept').value;
  const empId=document.getElementById('reg-id').value.trim();
  if(!name||!dept||!empId){ alert('請填寫完整的姓名、部門及工號'); return; }
  userData={name,dept,empId};
  const lawQs = QB.filter(q=>q.cat==='法規類').sort(()=>Math.random()-.5).slice(0,10);
  const praQs = QB.filter(q=>q.cat==='實務類').sort(()=>Math.random()-.5).slice(0,10);
  quizQuestions = [...lawQs,...praQs].sort(()=>Math.random()-.5);
  answers={}; currentQ=0; secondsLeft=1800; startTime=Date.now();
  show('quiz'); renderQ(); startTimer();
}

function startTimer(){
  clearInterval(quizTimer);
  quizTimer=setInterval(()=>{
    secondsLeft--;
    const m=Math.floor(secondsLeft/60).toString().padStart(2,'0');
    const s=(secondsLeft%60).toString().padStart(2,'0');
    document.getElementById('quiz-timer').textContent=`${m}:${s}`;
    if(secondsLeft<=0){ clearInterval(quizTimer); submitQuiz(); }
  },1000);
}

function renderQ(){
  const q=quizQuestions[currentQ];
  const total=quizQuestions.length;
  document.getElementById('q-progress-label').textContent=`第 ${currentQ+1} / ${total} 題`;
  document.getElementById('q-progress-fill').style.width=`${((currentQ+1)/total)*100}%`;
  document.getElementById('q-count-badge').textContent=`第 ${currentQ+1} 題 ／ 共 ${total} 題`;
  document.getElementById('q-category').textContent=`【${q.cat}】`;
  document.getElementById('q-text').textContent=q.q;
  const labels=['A','B','C','D'];
  document.getElementById('q-options').innerHTML=q.opts.map((o,i)=>{
    const cls='option'+(answers[currentQ]===i?' selected':'');
    return `<div class="${cls}" onclick="selectAnswer(${i})"><div class="option-label">${labels[i]}</div><span>${o}</span></div>`;
  }).join('');
  const eb=document.getElementById('q-explain');
  eb.style.display='none';
  document.getElementById('q-btn-prev').disabled=currentQ===0;
  const isLast=currentQ===total-1;
  const btn=document.getElementById('q-btn-next');
  if(isLast&&Object.keys(answers).length===total){ btn.textContent='提交測驗'; btn.className='btn btn-success'; btn.onclick=submitQuiz; }
  else{ btn.textContent=isLast?'提交測驗':'下一題 →'; btn.className='btn btn-primary'; btn.onclick=quizNext; }
}

function selectAnswer(i){
  answers[currentQ]=i; renderQ();
}
function quizNext(){
  if(answers[currentQ]===undefined){ alert('請先作答本題，再進入下一題'); return; }
  if(currentQ<quizQuestions.length-1){ currentQ++; renderQ(); }
  else{ submitQuiz(); }
}
function quizPrev(){ if(currentQ>0){ currentQ--; renderQ(); } }

function submitQuiz(){
  clearInterval(quizTimer);
  const elapsed=Math.round((Date.now()-startTime)/1000);
  const mins=Math.floor(elapsed/60), secs=elapsed%60;
  let correct=0; const wrong=[];
  quizQuestions.forEach((q,i)=>{ if(answers[i]===q.ans) correct++; else wrong.push({q,userAns:answers[i]}); });
  const pct=Math.round((correct/quizQuestions.length)*100);
  const pass=pct>=80;
  document.getElementById('result-score').textContent=correct*5+'分';
  document.getElementById('result-hero').className='result-hero '+(pass?'pass':'fail');
  document.getElementById('result-verdict').textContent=pass?'✅ 恭喜通過測驗！':'❌ 未達通過標準，建議重新複習課程';
  document.getElementById('result-time-spent').textContent=`作答時間 ${mins}分${secs}秒`;
  document.getElementById('rs-correct').textContent=correct;
  document.getElementById('rs-wrong').textContent=quizQuestions.length-correct;
  document.getElementById('rs-pct').textContent=pct+'%';
  const labels=['A','B','C','D'];
  const wrongHtml=wrong.length===0?'<div class="info-box green"><div class="box-title">🎉 全部答對！表現優異！</div></div>':
    `<h3>📋 答錯題目解析（共 ${wrong.length} 題）</h3>`+wrong.map(({q,userAns},idx)=>`
    <div class="wrong-item">
      <div class="wi-q">${idx+1}. 【${q.cat}】${q.q}</div>
      <div class="wi-wrong">❌ 您的答案：${userAns!==undefined?labels[userAns]+'、'+q.opts[userAns]:'未作答'}</div>
      <div class="wi-correct">✅ 正確答案：${labels[q.ans]}、${q.opts[q.ans]}</div>
      <div class="wi-explain">📖 ${q.exp}</div>
    </div>`).join('');
  document.getElementById('wrong-section').innerHTML=wrongHtml;
  show('result');
  saveToSheets(correct,pct,pass,wrong.length,`${mins}分${secs}秒`);
}

function saveToSheets(score,pct,pass,wrongCount,timeSpent){
  const banner=document.getElementById('saving-banner');
  if(GOOGLE_SCRIPT_URL==='YOUR_GOOGLE_APPS_SCRIPT_URL_HERE'){
    banner.className='saving-banner err';
    banner.innerHTML='⚠️ 尚未設定 Google 試算表連結，紀錄未能儲存。請依說明完成設定。';
    return;
  }
  const data={timestamp:new Date().toLocaleString('zh-TW'),name:userData.name,dept:userData.dept,empId:userData.empId,score,pct,pass:pass?'通過':'未通過',wrongCount,timeSpent};
  fetch(GOOGLE_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)})
    .then(()=>{ banner.className='saving-banner ok'; banner.innerHTML='✅ 測驗紀錄已成功儲存至 Google 試算表'; })
    .catch(()=>{ banner.className='saving-banner err'; banner.innerHTML='⚠️ 儲存失敗，請聯絡系統管理員'; });
}

renderSlide(); buildSidebar();
</script>
</body>
</html>
